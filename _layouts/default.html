<!DOCTYPE html>
<html lang="he" dir="rtl" class="lang-he">
<script>
(function(){
  var s = localStorage.getItem('lang');
  if (s === 'en') {
    document.documentElement.lang = 'en';
    document.documentElement.dir = 'ltr';
    document.documentElement.className = 'lang-en';
  }
})();
</script>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="jDvoaCvhvSO-22B9ifccJaCXycY9APeRx_-Ac6kZt7o" />
  {%- seo -%}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  {%- feed_meta -%}
</head>
<body>
  {%- include header.html -%}
  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>
  {%- include footer.html -%}
  <script src="{{ '/assets/js/lang-toggle.js' | relative_url }}"></script>
</body>
</html>
