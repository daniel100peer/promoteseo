---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">
      <span class="content-he">{{ page.title_he | default: page.title | escape }}</span>
      <span class="content-en">{{ page.title | escape }}</span>
    </h1>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
