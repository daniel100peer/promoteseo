<footer class="site-footer h-card">
  <data class="u-url" href="{{ '/' | relative_url }}"></data>
  <div class="wrapper">
    <h2 class="footer-heading">
      <span class="content-he">{{ site.title_he | escape }}</span>
      <span class="content-en">{{ site.title_en | escape }}</span>
    </h2>
    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-3">
        <p>
          <span class="content-he">{{ site.description_he | escape }}</span>
          <span class="content-en">{{ site.description_en | escape }}</span>
        </p>
      </div>
    </div>
  </div>
</footer>
